{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アカウント削除</title>
    <link rel="stylesheet" type="text/css" href="{% static 'chat/style.css' %}?v=2">
</head>
<body>
    
<div class="container">
<h2>アカウント削除</h2>
<p>本当にアカウントを削除しますか？この操作は元に戻せません。</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">削除する</button>
    <a href="{% url 'chat:room' %}" class="btn btn-cancel">キャンセル</a>
</form>
</div>

</body>
</html>
