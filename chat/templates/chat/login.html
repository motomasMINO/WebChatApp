{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン</title>
    <link rel="stylesheet" type="text/css" href="{% static 'chat/style.css' %}?v=2">
</head>
<body>

<div class="container">    
<h2>ログイン</h2>

{% if messages %}
    <ul>
        {% for message in messages %}
            <li style="color: red;">{{ message }}</li>
        {% endfor %}
    </ul>
{% endif %}

<form method="post">
    {% csrf_token %}
    <p>ユーザー名: <input type="text" name="username"></p>
    <p>パスワード: <input type="password" name="password"></p>
    <button type="submit">ログイン</button>
</form>
<a href="{% url 'chat:signup' %}" class="switch-btn">新規登録はこちら</a>
</div>

</body>
</html>
